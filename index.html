<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas e Reflexão sobre IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerenciador de Tarefas Inteligente</h1>
        
        <section class="task-section">
            <h2>Minhas Tarefas</h2>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Digite uma nova tarefa...">
                <button id="addTaskBtn">Adicionar</button>
            </div>
            <ul id="taskList"></ul>
        </section>

        <hr>

        <section class="reflection-section">
            <h2>Reflexão: O Impacto da IA no Cotidiano</h2>
            <div id="reflectionContent" class="reflection-card">
                <!-- A reflexão será inserida via JavaScript -->
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
